<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMai — Recipe Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>
    <header>
        <div class="header-inner">
            <a class="brand" href="/">
                <div class="brand-bubble">🍳</div>
                <span class="brand-text">CookMai</span>
            </a>

            <div class="brand-cooking">
                <span class="cooking-icon">✨</span>
                <span class="cooking-label">Find Recipes</span>
            </div>

            <div class="user-menu">
                <span class="user-greeting">Hi, <span id="username"></span></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <div id="heroSection" class="hero">
            <h1>Find your next<br><span>favourite recipe</span></h1>
            <p>Search thousands of recipes by name, ingredient, or cuisine</p>
            <form id="heroSearchForm" class="hero-search" action="/search" method="get">
                <input id="heroSearchInput" name="query" type="text" placeholder="e.g. chicken, pasta, vegan stir-fry...">
                <button type="submit">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Search
                </button>
            </form>
        </div>

    </main>

    <script>
        let currentUser = null;

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                if (data.authenticated) {
                    currentUser = data;
                    document.getElementById('username').textContent = data.username;
                } else {
                    window.location.href = '/login';
                }
            } catch (err) {
                window.location.href = '/login';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        });

        checkAuth();
    </script>
    <script src="{{ url_for('static', filename='javascript/index.js') }}"></script>
</body>

</html>
