<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMai — Search Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">
</head>

<body>
    <header>
        <div class="header-inner">
            <a class="brand" href="/">
                <div class="brand-bubble">🍳</div>
                <span class="brand-text">CookMai</span>
            </a>

            <div class="brand-cooking">
                <span class="cooking-icon">✨</span>
                <span class="cooking-label">Find Recipes</span>
            </div>

            <form id="headerSearchForm" class="header-search" action="/search" method="get">
                <input id="headerSearchInput" name="query" type="text" placeholder="Search recipes, ingredients..." value="{{ query }}">
                <button type="submit" aria-label="Search">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
            </form>

            <div class="user-menu">
                <a href="/folders" class="folders-link">📁 My Folders</a>
                <span class="user-greeting">Hi, <span id="username"></span></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <div id="resultsSection">
            <div id="typoAlert" class="alert">
                <span class="alert-icon">💡</span>
                <span class="alert-content">
                    <strong>Did you mean:</strong> <a id="suggestedLink" class="suggestion-link"></a>?
                    <span class="alert-divider">|</span>
                    <a id="keepOriginal" class="keep-link">Search for "<span id="originalQuery"></span>" instead</a>
                </span>
                <button class="alert-close" onclick="dismissAlert()">✕</button>
            </div>

            <div class="results-header">
                <h2 class="results-title">Recipes for <span id="queryLabel"></span></h2>
                <span id="resultsCount" class="results-count"></span>
            </div>

            <div id="spinner" class="spinner"><span class="spinner-ring"></span></div>

            <div id="noResults" class="no-results">
                <h3>No recipes found</h3>
                <p>Try simpler keywords or different ingredients</p>
            </div>

            <div id="recipeList" class="recipe-list"></div>
        </div>

    </main>

    <div id="recipeModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img id="modalImg" class="modal-hero-img" src="" alt="">
            <div class="modal-body">
                <h2 id="modalTitle" class="modal-title"></h2>

                <!-- Recipe Info Section -->
                <div class="modal-info-section">
                    <div id="modalDescription" class="modal-description"></div>
                    <div class="modal-meta-grid">
                        <div class="meta-item">
                            <span class="meta-label">Category:</span>
                            <span id="modalCategory" class="meta-value"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Prep:</span>
                            <span id="modalPrepTime" class="meta-value"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Cook:</span>
                            <span id="modalCookTime" class="meta-value"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Total:</span>
                            <span id="modalTotalTime" class="meta-value"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Servings:</span>
                            <span id="modalServings" class="meta-value"></span>
                        </div>
                        <div class="meta-item" id="ratingContainer">
                            <span class="meta-label">Rating:</span>
                            <span id="modalRating" class="meta-value"></span>
                        </div>
                    </div>
                </div>

                <div class="modal-cols">
                    <div>
                        <div class="col-label">Ingredients</div>
                        <ul id="modalIngredients"></ul>
                    </div>
                    <div>
                        <div class="col-label">Instructions</div>
                        <ol id="modalInstructions"></ol>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='javascript/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='javascript/model.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const query = {{ query | tojson }};
            if (query) {
                executeSearch(query);
            }
        });

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                if (data.authenticated) {
                    document.getElementById('username').textContent = data.username;
                } else {
                    window.location.href = '/login';
                }
            } catch (err) {
                window.location.href = '/login';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        });

        checkAuth();
    </script>
    <script src="{{ url_for('static', filename='javascript/search.js') }}"></script>
</body>

</html>
