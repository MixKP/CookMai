<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — CookMai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand-bubble">🍳</div>
                <h1 class="auth-title">Join CookMai</h1>
                <p class="auth-subtitle">Create your account</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" required autocomplete="username" minlength="3">
                    <small>At least 3 characters</small>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required autocomplete="new-password" minlength="6">
                    <small>At least 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required autocomplete="new-password">
                </div>

                <div id="errorMessage" class="error-message"></div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-spinner" style="display: none;">Creating account...</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('login_page') }}">Log in</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='javascript/auth.js') }}"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', handleRegister);
    </script>
</body>

</html>
